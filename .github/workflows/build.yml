name: CI

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GAME_VERSION: FIRERED
      GAME_LANGUAGE: ENGLISH
      GAME_REVISION: 0
      MODERN: 0
      COMPARE: 1
    steps:
      - name: Checkout
        uses: actions/checkout@master

      - name: Checkout agbcc
        uses: actions/checkout@master
        with:
          path: 'agbcc'
          repository: 'pret/agbcc'

      - name: Checkout symbols
        if: ${{ github.event_name == 'push' }}
        uses: actions/checkout@master
        with:
          path: 'symbols'
          ref: 'symbols'

      - name: Install binutils
        run: |
          sudo apt update
          sudo apt install gcc-arm-none-eabi binutils-arm-none-eabi libpng-dev
        # build-essential and git are already installed
        # gcc-arm-none-eabi is only needed for the modern build
        # as an alternative to dkP

      - name: Direction B offline (logical->physical table)
        run: python3 tools/check_direction_b_offline.py

      - name: Project C block-word contract (offline)
        run: python3 tools/check_project_c_block_word_offline.py

      - name: Project C Phase 3 u32 constants (offline)
        run: python3 tools/check_project_c_phase3_offline.py

      - name: Layout block bins (Project C)
        run: python3 tools/validate_map_layout_block_bin.py --layouts-json data/layouts/layouts.json --repo-root .

      - name: Layout ROM companion bundle (metatile + dimensions + tileset indices)
        run: |
          mkdir -p build
          python3 tools/portable_generators/build_map_layout_rom_companion_bundle.py .
          python3 tools/portable_generators/layout_rom_companion_emit_embed_env.py \
            build/offline_map_layout_rom_companion_bundle.bin.manifest.txt -b 0

      - name: Direction D offline (compiled tileset role map)
        run: python3 tools/check_direction_d_offline.py

      - name: Install agbcc
        run: |
          ./build.sh
          ./install.sh ../
        working-directory: ./agbcc

      - name: Compare FireRed
        run: |
          make -j${nproc} all syms

      - name: Compare FireRed rev1
        env:
          GAME_REVISION: 1
        run: |
          make -j${nproc} all syms

      - name: Compare LeafGreen
        env:
          GAME_VERSION: LEAFGREEN
        run: |
          make -j${nproc} all syms

      - name: Compare LeafGreen rev1
        env:
          GAME_VERSION: LEAFGREEN
          GAME_REVISION: 1
        run: |
          make -j${nproc} all syms

      - name: Build Modern
        env:
          MODERN: 1
          COMPARE: 0
        run: |
          make -j${nproc} all

      - name: Move symfiles
        if: ${{ github.event_name == 'push' }}
        run: |
          cp *.sym symbols/
          echo "SYMBOLS_COMMIT_MSG=$( git log --format=%s ${GITHUB_SHA} )" >> $GITHUB_ENV

      - name: Update symfiles
        if: ${{ github.event_name == 'push' }}
        uses: EndBug/add-and-commit@v7
        with:
          branch: symbols
          cwd: "./symbols"
          add: "*.sym"
          message: ${{ env.SYMBOLS_COMMIT_MSG }}
